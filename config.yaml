defaultModel: "gpt-5.2"

models:
  - name: "gpt-5.2"
    displayName: "GPT-5.2"
    provider: "openai"
    model: "gpt-5.2"
    apiKey: "$OPENAI_API_KEY"
    baseURL: "$OPENAI_BASE_URL"
    maxTokens: 4096
    temperature: 0.7
    supportsThinking: false
    supportsVision: true

  - name: "gpt-5.3-codex"
    displayName: "GPT-5.3 Codex"
    provider: "openai"
    model: "gpt-5.3-codex"
    apiKey: "$OPENAI_API_KEY"
    baseURL: "$OPENAI_BASE_URL"
    maxTokens: 4096
    temperature: 0.7
    supportsThinking: false
    supportsVision: true

tools:
  - name: "web_search"
    enabled: true
  - name: "web_fetch"
    enabled: true
  - name: "read_file"
    enabled: true
  - name: "write_file"
    enabled: true

memory:
  enabled: true
  injectionEnabled: true
  storagePath: "data/memory.json"
  debounceSeconds: 30
  maxFacts: 100
  factConfidenceThreshold: 0.7
  maxInjectionFacts: 15
